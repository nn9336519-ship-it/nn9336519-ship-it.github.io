<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Committees | KettleMUN III</title>

<style>
body {
    font-family: 'Georgia', serif;
    background: ##0c1424;
    margin: 0;
}

nav {
    background: #0b1c2d;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav h1 {
    color: white;
    margin: 0;
}

nav a {
    color: #d9d9d9;
    text-decoration: none;
    margin-left: 25px;
}

nav a:hover {
    color: white;
}

h2 {
    text-align: center;
    margin-top: 40px;
}

.committee-container {
    max-width: 1100px;
    margin: 50px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    padding: 20px;
}

.card {
    background: ##d4af44;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card img {
    width: 100%;
    border-radius: 6px;
    margin-bottom: 15px;
}

.card h3 {
    margin-top: 0;
}

footer {
    background: #0b1c2d;
    color: white;
    text-align: center;
    padding: 30px;
    margin-top: 60px;
}
</style>
</head>

<body>

<nav>
<h1>KettleMUN III</h1>
<div>
<a href="index.html">Home</a>
<a href="committees.html">Committees</a>
<a href="register.html">Register</a>
</div>
</nav>

<h2>Our Committees</h2>

<div class="committee-container" id="committeeContainer">
</div>

<footer>
© 2026 KettleMUN III · Excellence in Diplomacy
</footer>

<script>
const SHEET_ID = "1lggUftAi5KCErYMSidZ_XY5Iu6uZRl6KEZjLtQ130pE";

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Committees`)
.then(response => response.text())
.then(data => {
    const rows = data.split("\n").slice(1);
    const container = document.getElementById("committeeContainer");

    rows.forEach(row => {
        const columns = row.split(",");
        const name = columns[0];
        const description = columns[1];
        const image = columns[2];

        if(name) {
            container.innerHTML += `
                <div class="card">
                    ${image ? `<img src="${image}" alt="${name}">` : ""}
                    <h3>${name}</h3>
                    <p>${description}</p>
                </div>
            `;
        }
    });
});
</script>

</body>
</html>
