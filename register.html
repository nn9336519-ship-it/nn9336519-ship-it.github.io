<style>
body {
    font-family: 'Georgia', serif;
    background: #f8f6f3;
    margin: 0;
}

nav {
    background: #0b1c2d;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav h1 {
    color: white;
    margin: 0;
}

nav a {
    color: #d9d9d9;

    margin-left: 25px;
}

nav a:hover {
    color: white;
}

h2 {
    text-align: center;

}

form {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

label {
    display: block;
    margin-top: 20px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    margin-top: 30px;

    text-align: center;
    margin-top: 20px;

<body>

<nav>
<h1>KettleMUN III</h1>
<div>
<a href="index.html">Home</a>
<a href="committees.html">Committees</a>
<a href="register.html">Register</a>
</div>
</nav>

<h2>Register for KettleMUN III</h2>

<form id="customForm">

<label>Full Name</label>
<input type="text" name="entry.1443637798" required>

<label>Email</label>
<input type="email" name="entry.69260781" required>

<label>School</label>
<input type="text" name="entry.1897826115" required>

<label>Committee</label>
<select name="entry.830382605" required>
<option value="">Select a committee</option>
<option>Option 1</option>
</select>

<label>Role</label>
<select name="entry.137987200" required>
<option value="">Select role</option>
<option>Option 1</option>
</select>

<button type="submit">Submit Registration</button>

<div class="success" id="successMessage">
Thank you for registering for KettleMUN III!
</div>

</form>

<footer>
© 2026 KettleMUN III · Excellence in Diplomacy
</footer>

<script>
const form = document.getElementById("customForm");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(form);

    fetch("<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfvKsVMjOISKQipTZkkFKUMVm0zrSL0dztFTwyBkgra3buXCA/viewform?embedded=true" width="640" height="1054" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>", {
        method: "POST",
        mode: "no-cors",
        body: formData
    }).then(() => {
        document.getElementById("successMessage").style.display = "block";
        form.reset();
    });
});
</script>

</body>
</html>
